<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 680" role="img" aria-label="Latest UPI payment ecosystem simulator architecture map">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.48" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="0.5" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <style>
      .title{font:800 34px Inter,Segoe UI,Arial,sans-serif;fill:#0f172a}
      .sub{font:600 16px Inter,Segoe UI,Arial,sans-serif;fill:#475569}
      .box{rx:18;filter:url(#shadow);stroke-width:1.4}
      .head{font:800 18px Inter,Segoe UI,Arial,sans-serif;fill:#0f172a}
      .body{font:600 13px Inter,Segoe UI,Arial,sans-serif;fill:#475569}
      .pill{font:800 12px Inter,Segoe UI,Arial,sans-serif;fill:white}
      .line{stroke:url(#rail);stroke-width:5;fill:none;stroke-linecap:round;stroke-dasharray:12 12}
      .arrow{fill:#16a34a}
    </style>
  </defs>
  <rect width="1320" height="680" fill="url(#bg)"/>
  <circle cx="1120" cy="90" r="130" fill="#dbeafe" opacity="0.7"/>
  <circle cx="180" cy="590" r="150" fill="#ffedd5" opacity="0.75"/>
  <text x="58" y="70" class="title">Latest Architecture: Public-safe UPI Payment Ecosystem Simulator</text>
  <text x="60" y="102" class="sub">Signed demo RBAC, five adapters, HMAC webhooks, lifecycle timeline, reconciliation, refunds, disputes, and synthetic AIML/DL governance.</text>

  <rect x="60" y="150" width="210" height="122" fill="#ffffff" stroke="#bfdbfe" class="box"/>
  <text x="86" y="190" class="head">React Console</text>
  <text x="86" y="218" class="body">RBAC role selector</text>
  <text x="86" y="240" class="body">Payment Ecosystem Timeline</text>

  <rect x="330" y="150" width="210" height="122" fill="#ffffff" stroke="#c7d2fe" class="box"/>
  <text x="356" y="190" class="head">Signed Demo Auth</text>
  <text x="356" y="218" class="body">/api/auth/demo-token</text>
  <text x="356" y="240" class="body">Forged role headers ignored</text>

  <rect x="600" y="150" width="210" height="122" fill="#ffffff" stroke="#bae6fd" class="box"/>
  <text x="626" y="190" class="head">Express API</text>
  <text x="626" y="218" class="body">CRUD + domain decisioning</text>
  <text x="626" y="240" class="body">Zod, Helmet, rate limits</text>

  <rect x="870" y="150" width="210" height="122" fill="#ffffff" stroke="#bbf7d0" class="box"/>
  <text x="896" y="190" class="head">Simulator Core</text>
  <text x="896" y="218" class="body">Idempotency + state machine</text>
  <text x="896" y="240" class="body">Scenario matrix</text>

  <path d="M270 211 H330 M540 211 H600 M810 211 H870" class="line"/>

  <rect x="90" y="350" width="184" height="104" fill="#eff6ff" stroke="#60a5fa" class="box"/>
  <text x="116" y="386" class="head">PG Adapter</text>
  <text x="116" y="414" class="body">Checkout session</text>
  <text x="116" y="436" class="body">Redirect flow</text>

  <rect x="320" y="350" width="184" height="104" fill="#ecfeff" stroke="#22d3ee" class="box"/>
  <text x="346" y="386" class="head">PA Adapter</text>
  <text x="346" y="414" class="body">Order + attempts</text>
  <text x="346" y="436" class="body">Capture / failed retry</text>

  <rect x="550" y="350" width="184" height="104" fill="#f0fdf4" stroke="#4ade80" class="box"/>
  <text x="576" y="386" class="head">TPAP Adapter</text>
  <text x="576" y="414" class="body">App switch + PIN</text>
  <text x="576" y="436" class="body">Customer retry/drop</text>

  <rect x="780" y="350" width="184" height="104" fill="#fefce8" stroke="#facc15" class="box"/>
  <text x="806" y="386" class="head">PSP / Bank</text>
  <text x="806" y="414" class="body">Health windows</text>
  <text x="806" y="436" class="body">Timeout / decline</text>

  <rect x="1010" y="350" width="220" height="104" fill="#fff7ed" stroke="#fb923c" class="box"/>
  <text x="1036" y="386" class="head">NPCI-style Rail</text>
  <text x="1036" y="414" class="body">Success / deemed / hold</text>
  <text x="1036" y="436" class="body">No live NPCI API used</text>

  <path d="M274 402 H320 M504 402 H550 M734 402 H780 M964 402 H1010" class="line"/>

  <rect x="190" y="535" width="260" height="74" fill="#ffffff" stroke="#fed7aa" class="box"/>
  <text x="218" y="566" class="head">HMAC Webhooks</text>
  <text x="218" y="590" class="body">Duplicate + out-of-order handling</text>

  <rect x="530" y="535" width="260" height="74" fill="#ffffff" stroke="#bbf7d0" class="box"/>
  <text x="558" y="566" class="head">Reconciliation</text>
  <text x="558" y="590" class="body">Settlement, refund, dispute batches</text>

  <rect x="870" y="535" width="260" height="74" fill="#ffffff" stroke="#c4b5fd" class="box"/>
  <text x="898" y="566" class="head">AIML/DL Governance</text>
  <text x="898" y="590" class="body">10k synthetic rows + model card</text>

  <rect x="60" y="292" width="1168" height="34" rx="17" fill="url(#rail)" opacity="0.95"/>
  <text x="90" y="315" class="pill">Merchant -> PG -> PA -> TPAP -> PSP/Bank -> NPCI-style Rail -> Webhook -> Settlement -> Timeline</text>
</svg>
