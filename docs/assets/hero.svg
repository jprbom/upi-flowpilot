<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="UPI FlowPilot hero infographic">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520">
      <stop stop-color="#111827"/>
      <stop offset=".55" stop-color="#172033"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="brand" x1="80" y1="50" x2="1080" y2="430">
      <stop stop-color="#f97316"/><stop offset=".55" stop-color="#06b6d4"/><stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="soft"><feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity=".22"/></filter>
    <style>
      .title{font:800 54px ui-sans-serif,Segoe UI,Arial;fill:#fff}
      .sub{font:500 21px ui-sans-serif,Segoe UI,Arial;fill:#dbeafe}
      .label{font:700 14px ui-sans-serif,Segoe UI,Arial;fill:#93c5fd;text-transform:uppercase;letter-spacing:2px}
      .chip rect{fill:rgba(255,255,255,.10);stroke:rgba(255,255,255,.18)}
      .chip text{font:700 14px ui-sans-serif,Segoe UI,Arial;fill:#fff}
      .metric text{font:700 15px ui-sans-serif,Segoe UI,Arial;fill:#e5e7eb}
      .metric rect{fill:rgba(255,255,255,.12)}
      .bar{fill:url(#brand);animation:grow 4s ease-in-out infinite;transform-origin:left center}
      .node{fill:rgba(255,255,255,.10);stroke:url(#brand);stroke-width:3;filter:url(#soft)}
      .pulse{animation:pulse 3s ease-in-out infinite}
      @keyframes grow{0%,100%{transform:scaleX(.72)}50%{transform:scaleX(1)}}
      @keyframes pulse{0%,100%{opacity:.72;transform:translateY(0)}50%{opacity:1;transform:translateY(-5px)}}
    </style>
  </defs>
  <rect width="1200" height="520" rx="34" fill="url(#bg)"/>
  <circle cx="1048" cy="78" r="180" fill="#fff" opacity=".06"/>
  <circle cx="100" cy="454" r="140" fill="#fff" opacity=".05"/>
  <text x="42" y="74" class="label">India-scale UPI AI portfolio system</text>
  <text x="42" y="142" class="title">UPI FlowPilot</text>
  <foreignObject x="42" y="166" width="680" height="88"><div xmlns="http://www.w3.org/1999/xhtml" style="font:500 21px ui-sans-serif,Segoe UI,Arial;color:#dbeafe;line-height:1.45">Real-time UPI checkout reliability, flow selection, retry, and degradation intelligence for Bharat merchants.</div></foreignObject>
  <g transform="translate(430 244)">
    <rect x="0" y="0" width="260" height="54" rx="16" fill="url(#brand)" filter="url(#soft)" class="pulse"/>
    <text x="24" y="34" style="font:800 18px ui-sans-serif,Segoe UI,Arial;fill:white">Recommend best UPI rail</text>
  </g>
  <g class="chip" style="animation-delay:0ms"><rect x="42" y="316" width="204" height="34" rx="12"/><text x="58" y="338">Flow optimizer</text></g>
  <g class="chip" style="animation-delay:120ms"><rect x="272" y="316" width="204" height="34" rx="12"/><text x="288" y="338">Retry engine</text></g>
  <g class="chip" style="animation-delay:240ms"><rect x="502" y="316" width="204" height="34" rx="12"/><text x="518" y="338">Bank/PSP health</text></g>
  <g class="chip" style="animation-delay:360ms"><rect x="42" y="364" width="204" height="34" rx="12"/><text x="58" y="386">UPI Lite fallback</text></g>
  <g class="chip" style="animation-delay:480ms"><rect x="272" y="364" width="204" height="34" rx="12"/><text x="288" y="386">Failure explainer</text></g>
  <g>
    <rect x="746" y="84" width="374" height="330" rx="24" class="node"/>
    <text x="780" y="112" class="label">Operational command center</text>
    <g class="metric" style="animation-delay:0ms"><text x="780" y="128">Success Rate</text><rect x="780" y="142" width="280" height="10" rx="5"/><rect x="780" y="142" width="160" height="10" rx="5" class="bar"/></g>
  <g class="metric" style="animation-delay:160ms"><text x="780" y="196">Avg Latency</text><rect x="780" y="210" width="280" height="10" rx="5"/><rect x="780" y="210" width="188" height="10" rx="5" class="bar"/></g>
  <g class="metric" style="animation-delay:320ms"><text x="780" y="264">Revenue Leakage</text><rect x="780" y="278" width="280" height="10" rx="5"/><rect x="780" y="278" width="216" height="10" rx="5" class="bar"/></g>
  <g class="metric" style="animation-delay:480ms"><text x="780" y="332">Failure Mix</text><rect x="780" y="346" width="280" height="10" rx="5"/><rect x="780" y="346" width="244" height="10" rx="5" class="bar"/></g>
  </g>
  <path d="M692 270 C762 238 778 202 746 164" stroke="url(#brand)" stroke-width="5" stroke-linecap="round" stroke-dasharray="14 12">
    <animate attributeName="stroke-dashoffset" values="0;-80" dur="4s" repeatCount="indefinite"/>
  </path>
</svg>
